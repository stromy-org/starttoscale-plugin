<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Start to Scale — Three Steps mark">
  <!-- Three Steps Up — chaos → control → scale-up -->
  <!-- Bar 1: short -->
  <rect x="6" y="36" width="12" height="20" fill="#0A1F3D" rx="1"/>
  <!-- Bar 2: medium -->
  <rect x="26" y="20" width="12" height="36" fill="#0A1F3D" rx="1"/>
  <!-- Bar 3: tall, with amber cap (scale-up signal) -->
  <rect x="46" y="4"  width="12" height="52" fill="#0A1F3D" rx="1"/>
  <rect x="46" y="4"  width="12" height="12" fill="#E8A33D" rx="1"/>
</svg>
