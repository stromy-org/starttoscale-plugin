<svg viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three-Steps pattern tile">
  <!-- Repeating background tile — very low contrast for use as page/slide background at 6-12% opacity -->
  <defs>
    <pattern id="step-tile" x="0" y="0" width="120" height="60" patternUnits="userSpaceOnUse">
      <rect x="8"  y="44" width="10" height="12" fill="#0A1F3D"/>
      <rect x="26" y="34" width="10" height="22" fill="#0A1F3D"/>
      <rect x="44" y="20" width="10" height="36" fill="#0A1F3D"/>
      <rect x="68" y="44" width="10" height="12" fill="#0A1F3D"/>
      <rect x="86" y="34" width="10" height="22" fill="#0A1F3D"/>
      <rect x="104" y="20" width="10" height="36" fill="#0A1F3D"/>
    </pattern>
  </defs>
  <rect width="240" height="120" fill="url(#step-tile)" opacity="0.08"/>
</svg>
