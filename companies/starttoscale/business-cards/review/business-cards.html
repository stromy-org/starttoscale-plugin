<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Start to Scale — Business Cards (Amber Ascent)</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800&display=swap">
<style>
  :root { --navy: #0A1F3D; --paper: #FAF8F3; --amber: #E8A33D; --muted: #6B7280; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 48px;
    background: #ECECEC;
    font-family: 'Archivo', system-ui, sans-serif;
    color: var(--navy);
  }
  h1 { font-weight: 800; letter-spacing: -0.5px; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 32px; font-size: 14px; letter-spacing: 0.02em; }
  .cards { display: grid; grid-template-columns: repeat(2, minmax(260px, 420px)); gap: 32px; }
  .card {
    /* The source SVGs ARE the master — embed them so this preview never drifts. */
    display: block; width: 100%; aspect-ratio: 91 / 61;
    border-radius: 6px; overflow: hidden;
    box-shadow: 0 18px 48px -22px rgba(10, 31, 61, 0.45);
    background: #fff;
  }
  .card img { display: block; width: 100%; height: 100%; }
  .label {
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted); margin-top: 12px; font-weight: 600;
  }
  @media print {
    body { background: #fff; padding: 0; }
    h1, .sub, .label { display: none; }
    .cards { gap: 0; }
    .card { box-shadow: none; border-radius: 0; }
  }
</style>
</head>
<body>
  <h1>Start to Scale — Business Cards</h1>
  <p class="sub">Amber Ascent · 85 × 55 mm · double-sided · Step Rail + Archivo · paper front, navy back</p>
  <div class="cards">
    <div>
      <div class="card"><img src="../source/c01-eu-front.svg" alt="Business card front"></div>
      <div class="label">Front</div>
    </div>
    <div>
      <div class="card"><img src="../source/c01-eu-back.svg" alt="Business card back"></div>
      <div class="label">Back</div>
    </div>
  </div>
</body>
</html>
