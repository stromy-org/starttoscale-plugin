<svg xmlns="http://www.w3.org/2000/svg" width="91mm" height="61mm" viewBox="0 0 91 61">
  <!-- Start to Scale — business card FRONT (paper). EU bleed box 91x61mm; trim 85x55 inset 3mm. -->
  <rect width="91" height="61" fill="#FAF8F3"/>
  <!-- Step Rail mark: four navy bars, +18% geometric ascent, single-colour (bottom-aligned at y=22) -->
  <g>
    <rect x="11"   y="18"   width="1.6" height="4"    rx="0.3" fill="#0A1F3D"/>
    <rect x="13.2" y="16.1" width="1.6" height="5.9"  rx="0.3" fill="#0A1F3D"/>
    <rect x="15.4" y="14.1" width="1.6" height="7.9"  rx="0.3" fill="#0A1F3D"/>
    <rect x="17.6" y="12"   width="1.6" height="10"   rx="0.3" fill="#0A1F3D"/>
  </g>
  <!-- Name + role -->
  <text x="11" y="35" fill="#0A1F3D" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="6">Wilgert Hart</text>
