  <text x="11" y="51.5" fill="#0A1F3D" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="2.6">wilgert@starttoscalefinance.nl</text>
  <text x="11" y="55"   fill="#0A1F3D" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="2.6">starttoscalefinance.nl</text>
