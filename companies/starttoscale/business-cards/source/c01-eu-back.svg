<svg xmlns="http://www.w3.org/2000/svg" width="91mm" height="61mm" viewBox="0 0 91 61">
  <!-- Start to Scale — business card BACK (navy). EU bleed box 91x61mm; trim 85x55 inset 3mm. -->
  <rect width="91" height="61" fill="#0A1F3D"/>
  <!-- Corner Step Rail top-right: four paper bars, single-colour (bottom-aligned at y=19) -->
  <g>
    <rect x="78"   y="16.2" width="0.8" height="2.8"  rx="0.2" fill="#FAF8F3"/>
    <rect x="79.2" y="14.87" width="0.8" height="4.13" rx="0.2" fill="#FAF8F3"/>
    <rect x="80.4" y="13.47" width="0.8" height="5.53" rx="0.2" fill="#FAF8F3"/>
    <rect x="81.6" y="12"   width="0.8" height="7"    rx="0.2" fill="#FAF8F3"/>
  </g>
  <!-- Lockup -->
  <text x="11" y="24" fill="#FAF8F3" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="6">Start to Scale</text>
  <text x="11" y="29" fill="#D7DEEA" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="2.4" letter-spacing="0.45">FINANCIAL MANAGEMENT</text>
  <!-- Tagline (italic), amber emphasis on the final phrase -->
  <text x="11" y="45" fill="#FAF8F3" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-style="italic" font-weight="500" font-size="3.4">Van chaos naar controle.</text>
  <text x="11" y="49.5" fill="#FAF8F3" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-style="italic" font-weight="500" font-size="3.4">Van onderbuik naar inzicht.</text>
  <text x="11" y="54" fill="#FAF8F3" font-family="Archivo, 'Helvetica Neue', Arial, sans-serif" font-style="italic" font-weight="500" font-size="3.4">Van start-up naar <tspan fill="#E8A33D">serieuze scale-up.</tspan></text>
</svg>
