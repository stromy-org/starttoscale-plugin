<!DOCTYPE html>
<!-- Start to Scale — PPTX content shell (1920×1080).
     Empty body region intentional — the LLM-author composes the body. -->
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Start to Scale — Content</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap">
<style>
  :root { --navy: #0A1F3D; --amber: #E8A33D; --paper: #FAF8F3; --muted: #6B7280; }
  * { box-sizing: border-box; margin: 0; }
  html, body {
    width: 1920px; height: 1080px;
    background: var(--paper);
    color: var(--navy);
    font-family: 'Archivo', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .header {
    position: absolute;
    top: 56px; left: 96px; right: 96px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 24px;
    border-bottom: 1px solid #E5E2DA;
  }
  .header .overline {
    font-size: 14px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .header .mark {
    display: flex; align-items: flex-end; gap: 5px;
  }
  /* Step Rail mark — four ruled bars, +18% geometric ascent, single-colour */
  .header .mark .bar { background: var(--navy); border-radius: 1px; }
  .header .mark .b1 { width: 9px; height: 15px; }
  .header .mark .b2 { width: 9px; height: 22px; }
  .header .mark .b3 { width: 9px; height: 30px; }
  .header .mark .b4 { width: 9px; height: 38px; }
  .body {
    /* Reserved for body content. Margins reserved. */
    position: absolute;
    top: 180px; left: 96px; right: 96px; bottom: 120px;
  }
  .footer {
    position: absolute;
    bottom: 56px; left: 96px; right: 96px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #E5E2DA;
    padding-top: 24px;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .page-number {
    font-family: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 500;
    font-size: 18px;
    color: var(--navy);
    letter-spacing: 0;
    text-transform: none;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="overline">{{deck.sectionLabel | 'Section'}}</div>
    <div class="mark"><span class="bar b1"></span><span class="bar b2"></span><span class="bar b3"></span><span class="bar b4"></span></div>
  </div>
  <div class="body" data-region="content"><!-- body --></div>
  <div class="footer">
    <div>{{deck.confidential | 'Confidential'}} · {{deck.title | 'Start to Scale'}}</div>
    <div class="page-number">{{deck.page | '01'}}</div>
  </div>
</body>
</html>
