<!DOCTYPE html>
<!-- Start to Scale — re-usable PPTX footer bar fragment. -->
<html lang="nl">
<head>
<meta charset="UTF-8">
<style>
  :root { --navy: #0A1F3D; --amber: #E8A33D; --paper: #FAF8F3; --muted: #6B7280; }
  * { box-sizing: border-box; margin: 0; }
  body {
    width: 1920px; height: 80px;
    background: var(--paper);
    font-family: 'Inter', -apple-system, sans-serif;
    margin: 0; padding: 24px 96px 0;
    border-top: 1px solid #E5E2DA;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .left { font-weight: 500; }
  .right {
    font-family: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 500;
    color: var(--navy);
    letter-spacing: 0;
    text-transform: none;
    font-size: 18px;
  }
  .amber-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--amber);
    border-radius: 1px;
    vertical-align: middle;
    margin-left: 8px;
  }
</style>
</head>
<body>
  <div class="left">{{deck.confidential | 'Confidential'}} · {{deck.title | 'Start to Scale'}}<span class="amber-dot"></span></div>
  <div class="right">{{deck.page | '01'}}</div>
</body>
</html>
