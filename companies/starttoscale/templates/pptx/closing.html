<!DOCTYPE html>
<!-- Start to Scale — PPTX closing shell (1920×1080) -->
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Start to Scale — Closing</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap">
<style>
  :root { --navy: #0A1F3D; --amber: #E8A33D; --paper: #FAF8F3; }
  * { box-sizing: border-box; margin: 0; }
  html, body {
    width: 1920px; height: 1080px;
    background: var(--navy);
    color: var(--paper);
    font-family: 'Archivo', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .slide {
    padding: 96px 120px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }
  .top { display: flex; justify-content: space-between; align-items: center; }
  .mark { display: flex; align-items: flex-end; gap: 8px; }
  .mark .bar { background: var(--paper); border-radius: 2px; }
  .mark .b1 { width: 16px; height: 24px; }
  .mark .b2 { width: 16px; height: 44px; }
  .mark .b3 { width: 16px; height: 64px; position: relative; }
  .mark .b3::before {
    content: ""; position: absolute; top: 0; left: 0;
    width: 16px; height: 16px;
    background: var(--amber); border-radius: 2px;
  }
  .overline {
    font-size: 18px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #B0BCD0;
    font-weight: 500;
  }
  .tagline {
    font-family: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 500;
    font-size: 88px;
    line-height: 1.18;
    letter-spacing: -0.025em;
    max-width: 1400px;
  }
  .tagline .amber { color: var(--amber); }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1.5px solid var(--paper);
    padding-top: 32px;
    color: #D7DEEA;
    font-size: 18px;
    letter-spacing: 0.08em;
  }
  .footer a { color: inherit; text-decoration: none; }
</style>
</head>
<body>
  <div class="slide">
    <div class="top">
      <div class="mark"><span class="bar b1"></span><span class="bar b2"></span><span class="bar b3"></span></div>
      <div class="overline">{{deck.closingKicker | 'CLOSING'}}</div>
    </div>
    <div>
      <p class="tagline">
        Van chaos naar controle.<br>
        Van onderbuik naar inzicht.<br>
        Van start-up naar <span class="amber">serieuze scale-up.</span>
      </p>
    </div>
    <div class="footer">
      <div>{{contact.name | 'Wilgert Hart'}} · {{contact.title | 'Managing Partner'}}</div>
      <div><a href="mailto:{{contact.email | 'wilgert@starttoscale.nl'}}">{{contact.email | 'wilgert@starttoscale.nl'}}</a> · starttoscale.nl</div>
    </div>
  </div>
</body>
</html>
