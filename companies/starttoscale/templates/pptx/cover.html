<!DOCTYPE html>
<!--
  Start to Scale — PPTX cover shell (1920×1080, 16:9).
  Visible frame only. Body content is filled by the pptx-hd skill or LLM-author.
  Reads tokens via inline CSS variables.
-->
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Start to Scale — Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap">
<style>
  :root {
    --navy: #0A1F3D;
    --amber: #E8A33D;
    --paper: #FAF8F3;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body {
    width: 1920px; height: 1080px;
    background: var(--navy);
    color: var(--paper);
    font-family: 'Archivo', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .slide {
    padding: 96px 120px 96px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .mark {
    display: flex; align-items: flex-end; gap: 8px;
  }
  .mark .bar { background: var(--paper); border-radius: 2px; }
  .mark .b1 { width: 16px; height: 24px; }
  .mark .b2 { width: 16px; height: 44px; }
  .mark .b3 { width: 16px; height: 64px; position: relative; }
  .mark .b3::before {
    content: ""; position: absolute; top: 0; left: 0;
    width: 16px; height: 16px;
    background: var(--amber); border-radius: 2px;
  }
  .overline {
    font-size: 18px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #B0BCD0;
    font-weight: 500;
  }
  .title {
    font-family: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 500;
    font-size: 96px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    max-width: 1400px;
    color: var(--paper);
  }
  .meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: 1.5px solid var(--paper);
    padding-top: 32px;
  }
  .meta .wordmark {
    font-family: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 500;
    font-size: 28px;
  }
  .meta .wordmark-caption {
    font-size: 12px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #B0BCD0;
    margin-top: 4px;
  }
  .meta .date {
    font-size: 16px;
    color: #B0BCD0;
    letter-spacing: 0.08em;
  }
  .corner-amber {
    position: absolute;
    top: 0; right: 0;
    width: 240px; height: 8px;
    background: var(--amber);
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="corner-amber"></div>
    <div class="top">
      <div class="mark">
        <span class="bar b1"></span>
        <span class="bar b2"></span>
        <span class="bar b3"></span>
      </div>
      <div class="overline">{{deck.kicker | 'COVER'}}</div>
    </div>
    <div>
      <h1 class="title">{{deck.title | 'Deck title goes here'}}</h1>
    </div>
    <div class="meta">
      <div>
        <div class="wordmark">Start to Scale</div>
        <div class="wordmark-caption">FINANCIAL MANAGEMENT</div>
      </div>
      <div class="date">{{deck.date | '2026-06-01'}}</div>
    </div>
  </div>
</body>
</html>
