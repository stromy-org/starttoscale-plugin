<!DOCTYPE html>
<!-- Start to Scale — PPTX section-divider shell (1920×1080) -->
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Start to Scale — Section</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap">
<style>
  :root { --navy: #0A1F3D; --amber: #E8A33D; --paper: #FAF8F3; }
  * { box-sizing: border-box; margin: 0; }
  html, body {
    width: 1920px; height: 1080px;
    background: var(--paper);
    color: var(--navy);
    font-family: 'Archivo', sans-serif;
    overflow: hidden;
  }
  .slide {
    padding: 96px 120px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }
  .number {
    font-family: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 500;
    font-size: 160px;
    color: var(--amber);
    line-height: 1;
    margin-bottom: 24px;
  }
  .overline {
    font-size: 18px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #6B7280;
    font-weight: 500;
    margin-bottom: 24px;
  }
  .title {
    font-family: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
    font-weight: 500;
    font-size: 96px;
    line-height: 1.1;
    letter-spacing: -0.025em;
    max-width: 1400px;
    margin-bottom: 32px;
  }
  .divider {
    width: 480px;
    height: 1.5px;
    background: linear-gradient(to right, var(--navy) 0%, var(--navy) 88%, var(--amber) 88%, var(--amber) 100%);
  }
  .footer-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 6px;
    background: var(--navy);
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="number">{{section.number | '01'}}</div>
    <div class="overline">{{section.kicker | 'SECTION'}}</div>
    <h1 class="title">{{section.title | 'Section title'}}</h1>
    <div class="divider"></div>
    <div class="footer-bar"></div>
  </div>
</body>
</html>
